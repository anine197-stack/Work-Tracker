const today=()=>new Date().toISOString().slice(0,10);
const nowTs=()=>Date.now();
const uid=()=>Date.now()+Math.floor(Math.random()*1000);

const LS={
  get:(k)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
  del:(k)=>{try{localStorage.removeItem(k)}catch{}},
};

function mergeById(localArr=[], remoteArr=[]) {
  const map=new Map();
  for(const item of remoteArr||[]) if(item&&item.id!=null) map.set(String(item.id),item);
  for(const item of localArr||[]){
    if(!item||item.id==null) continue;
    const key=String(item.id), old=map.get(key);
    if(!old) map.set(key,item);
    else {
      const lt=item.updatedAt||item.id||0, rt=old.updatedAt||old.id||0;
      if(lt>=rt) map.set(key,item);
    }
  }
  return Array.from(map.values()).filter(i=>!i._deleted);
}
function mergeLogs(local={}, remote={}){
  const dates=new Set([...Object.keys(local||{}),...Object.keys(remote||{})]);
  const out={};
  for(const d of dates){
    const arr=mergeById(local[d]||[],remote[d]||[]);
    if(arr.length) out[d]=arr;
  }
  return out;
}
function softDelete(arr,id){return (arr||[]).map(i=>String(i.id)===String(id)?{...i,_deleted:true,updatedAt:nowTs()}:i)}
function ensureDefaultProjects(projects){
  const arr=[...(projects||[])];
  for(const p of DEFAULT_PROJECTS){
    if(!arr.some(x=>x.name===p.name)){
      arr.push({id:uid(),name:p.name,type:p.type,status:"active",goal:p.goal,currentState:"",nextAction:"",stakeholders:[],tags:[],createdAt:today(),updatedAt:nowTs()});
    }
  }
  return arr;
}
function normalizeProject(p){
  return {
    id:p.id||uid(),
    name:p.name||"未命名项目",
    type:p.type||"支持",
    status:p.status==="blocked"?"paused":(p.status||"active"),
    goal:p.goal||"",
    currentState:p.currentState||"",
    nextAction:p.nextAction||"",
    stakeholders:p.stakeholders||[],
    tags:p.tags||[],
    createdAt:p.createdAt||p.created||today(),
    updatedAt:p.updatedAt||p.id||nowTs(),
    _deleted:!!p._deleted,
  };
}
function normalizeTask(t){
  let status=t.status;
  if(!status){
    if(t.done) status="done";
    else if(t.blocked) status="waiting";
    else status="inbox";
  }
  return {
    id:t.id||uid(),
    title:t.title||t.name||"未命名待办",
    status,
    projectId:t.projectId||null,
    nextAction:t.nextAction||"",
    waitingFor:t.waitingFor||"",
    note:t.note||"",
    due:t.due||t.deadline||null,
    pinned:!!t.pinned,
    value:t.value,
    urgency:t.urgency,
    source:t.source||"manual",
    createdAt:t.createdAt||t.created||today(),
    updatedAt:t.updatedAt||t.id||nowTs(),
    _deleted:!!t._deleted,
  };
}
function normalizeKnowledge(k){
  const domains=(k&&k.domains)||DOMAINS.map(d=>({id:d.id,themes:[]}));
  return {domains:DOMAINS.map(d=>{
    const old=domains.find(x=>x.id===d.id)||{id:d.id,themes:[]};
    return {id:d.id,themes:(old.themes||[]).filter(t=>!t._deleted).map(t=>({
      id:t.id||uid(),
      name:t.name||"未命名主题",
      updatedAt:t.updatedAt||t.id||nowTs(),
      entries:(t.entries||[]).filter(e=>!e._deleted).map(e=>({
        id:e.id||uid(),
        title:e.title||"",
        content:e.content||"",
        projectId:e.projectId||null,
        tags:e.tags||[],
        entryType:e.entryType||"判断框架",
        confidence:e.confidence||"可复用",
        logRef:e.logRef||null,
        createdAt:e.createdAt||today(),
        updatedAt:e.updatedAt||e.id||nowTs(),
      }))
    }))};
  })};
}
function normalizeData(input){
  const d=input||{};
  let projects=(d.projects||d.pool?.projects||[]).map(normalizeProject);
  projects=ensureDefaultProjects(projects);
  const tasks=(d.tasks||d.pool?.items||[]).map(normalizeTask);
  const logs={};
  for(const [date,arr] of Object.entries(d.logs||{})){
    logs[date]=(arr||[]).filter(x=>!x._deleted).map(x=>({
      id:x.id||uid(),
      name:x.name||"未命名事项",
      cat:x.cat||"fragment",
      mins:Number(x.mins)||30,
      note:x.note||"",
      projectId:x.projectId||null,
      createdAt:x.createdAt||date,
      updatedAt:x.updatedAt||x.id||nowTs(),
    }));
  }
  return {
    version:3,
    logs,
    dailyNotes:d.dailyNotes||{},
    projects,
    tasks,
    knowledge:normalizeKnowledge(d.knowledge||{}),
    meta:{...(d.meta||{}),migratedAt:d.version===3?d.meta?.migratedAt:new Date().toISOString()},
  };
}
function mergeKnowledge(local,remote){
  const l=normalizeKnowledge(local), r=normalizeKnowledge(remote);
  return {domains:DOMAINS.map(dom=>{
    const ld=(l.domains||[]).find(d=>d.id===dom.id)||{themes:[]};
    const rd=(r.domains||[]).find(d=>d.id===dom.id)||{themes:[]};
    const themes=mergeById(ld.themes||[],rd.themes||[]).map(t=>{
      const lt=(ld.themes||[]).find(x=>String(x.id)===String(t.id))||{};
      const rt=(rd.themes||[]).find(x=>String(x.id)===String(t.id))||{};
      return {...t,entries:mergeById(lt.entries||[],rt.entries||[])};
    });
    return {id:dom.id,themes};
  })};
}
function mergeData(local,remote){
  const l=normalizeData(local), r=normalizeData(remote);
  return normalizeData({
    version:3,
    logs:mergeLogs(l.logs,r.logs),
    dailyNotes:{...(r.dailyNotes||{}),...(l.dailyNotes||{})},
    projects:mergeById(l.projects,r.projects),
    tasks:mergeById(l.tasks,r.tasks),
    knowledge:mergeKnowledge(l.knowledge,r.knowledge),
    meta:{...(r.meta||{}),...(l.meta||{})},
  });
}

// 加密兼容说明：旧版 tracker 使用 wt-salt-v1。
// v3 结构可以升级，但加密 salt 不能随便改；否则旧 Gist 会无法解密，表现为“同步失败”。
// 因此：加密统一继续使用 v1；解密同时兼容 v1 和曾短暂使用过的 v3。
async function deriveKey(pwd,salt="wt-salt-v1"){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey("raw",enc.encode(pwd),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt:enc.encode(salt),iterations:100000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);
}
async function encryptStr(text,pwd){
  const key=await deriveKey(pwd,"wt-salt-v1");
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const buf=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,new TextEncoder().encode(text));
  const out=new Uint8Array(12+buf.byteLength);out.set(iv);out.set(new Uint8Array(buf),12);
  return btoa(String.fromCharCode(...out));
}
async function decryptStr(b64,pwd){
  const buf=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
  let lastErr=null;
  for(const salt of ["wt-salt-v1","wt-salt-v3"]){
    try{
      const key=await deriveKey(pwd,salt);
      const dec=await crypto.subtle.decrypt({name:"AES-GCM",iv:buf.slice(0,12)},key,buf.slice(12));
      return new TextDecoder().decode(dec);
    }catch(e){lastErr=e}
  }
  throw lastErr||new Error("解密失败");
}
const GH={
  async create(token,content){
    const r=await fetch("https://api.github.com/gists",{method:"POST",headers:{Authorization:`token ${token}`,"Content-Type":"application/json"},body:JSON.stringify({description:"work-tracker-data-v3",public:false,files:{"wt.txt":{content}}})});
    const j=await r.json(); if(!j.id) throw new Error(j.message||"创建失败"); return j.id;
  },
  async update(token,id,content){
    const r=await fetch(`https://api.github.com/gists/${id}`,{method:"PATCH",headers:{Authorization:`token ${token}`,"Content-Type":"application/json"},body:JSON.stringify({files:{"wt.txt":{content}}})});
    if(!r.ok) throw new Error("更新失败");
  },
  async fetch(token,id){
    const r=await fetch(`https://api.github.com/gists/${id}`,{headers:{Authorization:`token ${token}`}});
    const j=await r.json(); return j.files?.["wt.txt"]?.content||null;
  }
};

const S={
  app:{maxWidth:560,margin:"0 auto",padding:"16px 12px",minHeight:"100vh",background:"#f5f6fa"},
  card:{background:"#fff",borderRadius:14,padding:16,marginBottom:12,boxShadow:"0 1px 5px rgba(15,23,42,.07)"},

function activeProjects(projects){return (projects||[]).filter(p=>!p._deleted)}
function ProjectName({projects,id}){const p=activeProjects(projects).find(x=>String(x.id)===String(id));return p?<span>{p.name}</span>:<span style={{color:"#9ca3af"}}>无归属项目</span>}
function StatusPill({status}){const s=statusDef(status);return <span style={S.badge(s.color)}>{s.label}</span>}
function ProjectSelect({projects,value,onChange,allowEmpty=true}){const ps=activeProjects(projects);return <select style={S.select} value={value||""} onChange={e=>onChange(e.target.value||null)}>{allowEmpty&&<option value="">无归属项目</option>}{ps.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>}
function CardTitle({children,sub}){return <div style={{marginBottom:12}}><div style={{fontSize:15,fontWeight:800,color:"#111827"}}>{children}</div>{sub&&<div style={{fontSize:12,color:"#9ca3af",marginTop:3}}>{sub}</div>}</div>}

function App(){
  const [tab,setTab]=useState("log");
  const [data,setData]=useState(()=>normalizeData(null));
  const [loading,setLoading]=useState(true);
  const [ghToken,setGhToken]=useState("");
  const [ghGistId,setGhGistId]=useState("");
  const [encPwd,setEncPwd]=useState("");
  const [syncStatus,setSyncStatus]=useState("unconfigured");
  const [syncMsg,setSyncMsg]=useState("");
  const [lastSynced,setLastSynced]=useState("");
  const isConfigured=!!(ghToken&&ghGistId&&encPwd);

  useEffect(()=>{(async()=>{
    const saved=LS.get("wt-data");
    const token=LS.get("gh-token")||""; const gid=LS.get("gh-gist-id")||""; const pwd=LS.get("enc-pwd")||""; const ls=LS.get("last-synced")||"";
    setGhToken(token);setGhGistId(gid);setEncPwd(pwd);setLastSynced(ls);
    let local=normalizeData(saved);
    if(token&&gid&&pwd){
      setSyncStatus("syncing");
      try{
        const raw=await GH.fetch(token,gid);
        if(raw){
          const plain=await decryptStr(raw,pwd);
          const remote=normalizeData(JSON.parse(plain));
          local=mergeData(local,remote);
          const enc=await encryptStr(JSON.stringify(local),pwd);
          await GH.update(token,gid,enc);
        }
        const n=new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"});
        setLastSynced(n);LS.set("last-synced",n);setSyncStatus("synced");
      }catch(e){setSyncStatus("error");setSyncMsg("同步失败，使用本地数据："+e.message)}
    }
    setData(local);LS.set("wt-data",local);setLoading(false);
  })()},[]);

  const save=useCallback(async(newData)=>{
    const norm=normalizeData(newData);
    setData(norm); LS.set("wt-data",norm);
    if(ghToken&&ghGistId&&encPwd){
      setSyncStatus("syncing"); setSyncMsg("");
      try{
        const raw=await GH.fetch(ghToken,ghGistId);
        let merged=norm;
        if(raw){
          const remote=normalizeData(JSON.parse(await decryptStr(raw,encPwd)));
          merged=mergeData(norm,remote); setData(merged); LS.set("wt-data",merged);
        }
        await GH.update(ghToken,ghGistId,await encryptStr(JSON.stringify(merged),encPwd));
        const n=new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"});
        setLastSynced(n);LS.set("last-synced",n);setSyncStatus("synced");
      }catch(e){setSyncStatus("error");setSyncMsg("同步失败，已保存本地："+e.message)}
    }
  },[ghToken,ghGistId,encPwd]);

  const manualSync=async()=>{
    if(!isConfigured) return;
    setSyncStatus("syncing"); setSyncMsg("");
    try{
      const raw=await GH.fetch(ghToken,ghGistId);
      let merged=data;
      if(raw){merged=mergeData(data,normalizeData(JSON.parse(await decryptStr(raw,encPwd))))}
      await GH.update(ghToken,ghGistId,await encryptStr(JSON.stringify(merged),encPwd));
      setData(merged);LS.set("wt-data",merged);
      const n=new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"});
      setLastSynced(n);LS.set("last-synced",n);setSyncStatus("synced");setSyncMsg("同步完成");
    }catch(e){setSyncStatus("error");setSyncMsg("同步失败："+e.message)}
  };
  const connectGist=async(mode,existingId)=>{
    if(!ghToken.trim()||!encPwd.trim()||(mode==="existing"&&!existingId.trim())){setSyncMsg("请填写 Token、加密密码"+(mode==="existing"?"和 Gist ID":""));return;}
    setSyncStatus("syncing"); setSyncMsg("");
    try{
      let id=existingId;
      let merged=data;
      if(mode==="new") id=await GH.create(ghToken.trim(),await encryptStr(JSON.stringify(data),encPwd));
      else {
        const raw=await GH.fetch(ghToken.trim(),existingId.trim());
        if(raw){merged=mergeData(data,normalizeData(JSON.parse(await decryptStr(raw,encPwd))))}
        await GH.update(ghToken.trim(),existingId.trim(),await encryptStr(JSON.stringify(merged),encPwd));
      }
      setGhGistId(id.trim()); LS.set("gh-token",ghToken.trim()); LS.set("gh-gist-id",id.trim()); LS.set("enc-pwd",encPwd);
      setData(merged); LS.set("wt-data",merged);
      const n=new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"}); setLastSynced(n); LS.set("last-synced",n);
      setSyncStatus("synced"); setSyncMsg("连接成功");
    }catch(e){setSyncStatus("error");setSyncMsg("连接失败："+e.message)}
  };
  const disconnect=()=>{setGhGistId("");setGhToken("");setEncPwd("");setLastSynced("");setSyncStatus("unconfigured");setSyncMsg("");["gh-token","gh-gist-id","enc-pwd","last-synced"].forEach(LS.del)};

  if(loading) return <div style={{...S.app,display:"flex",alignItems:"center",justifyContent:"center"}}><p style={{color:"#9ca3af"}}>加载中…</p></div>;
  const syncColor={unconfigured:"#9ca3af",syncing:"#d97706",synced:"#059669",error:"#dc2626"}[syncStatus];
  const syncLabel={unconfigured:"未同步",syncing:"同步中…",synced:"已同步",error:"同步失败"}[syncStatus];
  return <div style={S.app}>
    <div style={{textAlign:"center",marginBottom:18}}>
      <div style={{fontSize:16,fontWeight:900,letterSpacing:1}}>THE TRACKER</div>
      <div style={{fontSize:11,color:"#9ca3af",marginTop:4,display:"flex",justifyContent:"center",gap:6,alignItems:"center"}}>
        工作日志 · 待办池 · 项目档案 · 知识库
        <span style={{display:"inline-flex",alignItems:"center",gap:3,color:syncColor}}><span style={{width:6,height:6,borderRadius:"50%",background:syncColor,display:"inline-block"}}/>{syncLabel}{lastSynced&&syncStatus==="synced"&&<span style={{color:"#9ca3af"}}>· {lastSynced}</span>}</span>
      </div>
    </div>
    <div style={S.tabs}>

      <button style={S.tab(tab==="projects")} onClick={()=>setTab("projects")}>项目</button>

  const shift=d=>{const dt=new Date(selDate);dt.setDate(dt.getDate()+d);setSelDate(dt.toISOString().slice(0,10));};

      <textarea style={{...S.textarea,marginBottom:8}} placeholder="备注：判断、问题、情绪、风险点、可沉淀内容…" value={note} onChange={e=>setNote(e.target.value)}/>

        <input style={{...S.input,marginBottom:8}} value={edit.name} onChange={ev=>setEdit({...edit,name:ev.target.value})}/>
        <div style={{...S.row,marginBottom:8}}><select style={S.select} value={edit.cat} onChange={ev=>setEdit({...edit,cat:ev.target.value})}>{CATS.map(c=><option key={c.key} value={c.key}>{c.label}</option>)}</select><select style={{...S.select,flex:"0 0 88px"}} value={edit.mins} onChange={ev=>setEdit({...edit,mins:Number(ev.target.value)})}>{[5,10,15,30,45,60,90,120,180,240].map(m=><option key={m} value={m}>{fmtMins(m)}</option>)}</select></div>

      </div>:<div><div style={{display:"flex",justifyContent:"space-between",gap:8}}><div style={{minWidth:0}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{width:8,height:8,borderRadius:"50%",background:c.color,display:"inline-block",flexShrink:0}}/><span style={{fontSize:13,fontWeight:650}}>{e.name}</span></div><div style={{fontSize:11,color:"#9ca3af",marginTop:4,paddingLeft:16}}>{c.label} · {fmtMins(e.mins)}{p?` · ${p.name}`:""}</div></div><div style={{display:"flex",gap:5,flexShrink:0}}><button style={S.btnSm("#f59e0b","#fff")} onClick={()=>setEdit({...e})}>✎</button><button style={S.btnSm("#dc2626","#fff")} onClick={()=>remove(e.id)}>删</button></div></div>{e.note&&<div style={{fontSize:12,color:"#4b5563",marginTop:8,paddingLeft:12,borderLeft:"2px solid #e5e7eb",whiteSpace:"pre-wrap"}}>{e.note}</div>}</div>}</div>})}
      <button style={{...S.btnFull("#f9fafb","#374151"),border:"1px solid #e5e7eb",marginTop:4}} onClick={()=>setExportOpen(true)}>↓ 导出数据</button>
    </div>}
    <div style={S.card}><label style={S.label}>今日状态</label><textarea style={{...S.textarea,minHeight:76,color:"#6b7280"}} placeholder="今天状态怎样？有什么感受或想法…" value={dailyNote} onChange={e=>setDailyNote(e.target.value)} onBlur={saveDaily}/></div>
    {exportOpen&&<ExportModal data={data} defaultDate={selDate} onClose={()=>setExportOpen(false)}/>} 
  </>
}

function TasksTab({data,save}){
  const [quick,setQuick]=useState(""); const [mode,setMode]=useState("daily"); const [edit,setEdit]=useState(null); const [organize,setOrganize]=useState(null);
  const tasks=(data.tasks||[]).filter(t=>!t._deleted);
  const projects=activeProjects(data.projects);
  const active=tasks.filter(t=>t.status!=="done"&&t.status!=="dropped");
  const addQuick=()=>{if(!quick.trim())return; const t={id:uid(),title:quick.trim(),status:"inbox",projectId:null,nextAction:"",waitingFor:"",note:"",due:null,pinned:false,source:"manual",createdAt:today(),updatedAt:nowTs()}; save({...data,tasks:[t,...tasks]}); setQuick("");};
  const updateTask=(id,patch)=>save({...data,tasks:tasks.map(t=>String(t.id)===String(id)?{...t,...patch,updatedAt:nowTs()}:t)});
  const removeTask=id=>save({...data,tasks:softDelete(tasks,id)});
  const inbox=tasks.filter(t=>t.status==="inbox");
  const counts=Object.fromEntries(TASK_STATUS.map(s=>[s.key,tasks.filter(t=>t.status===s.key).length]));
  const sorted=arr=>[...arr].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||String(a.due||"9999").localeCompare(String(b.due||"9999"))||(b.updatedAt||0)-(a.updatedAt||0));
  const openOrganize=()=>setOrganize(inbox[0]?{...inbox[0]}:null);
  const saveOrganize=(status)=>{if(!organize)return; updateTask(organize.id,{...organize,status}); const rest=inbox.filter(t=>String(t.id)!==String(organize.id)); setOrganize(rest[0]?{...rest[0]}:null);};
  const TaskCard=({task})=>{const p=projects.find(x=>String(x.id)===String(task.projectId)); const s=statusDef(task.status); return <div style={{padding:"10px 12px",background:"#f9fafb",borderRadius:9,marginBottom:7,borderLeft:`3px solid ${s.color}`}}>
    <div style={{display:"flex",justifyContent:"space-between",gap:8}}><div style={{minWidth:0}}><div style={{fontSize:13,fontWeight:700}}>{task.title}</div><div style={{fontSize:11,color:"#9ca3af",marginTop:4}}><StatusPill status={task.status}/>{p&&<span style={{marginLeft:4}}>{p.name}</span>}{task.due&&<span style={{marginLeft:6,color:task.due<=today()?"#dc2626":"#6b7280"}}>截止：{task.due}</span>}</div>{task.nextAction&&<div style={{fontSize:12,color:"#4b5563",marginTop:6}}>下一步：{task.nextAction}</div>}{task.waitingFor&&<div style={{fontSize:12,color:"#d97706",marginTop:4}}>等待：{task.waitingFor}</div>}{task.note&&<div style={{fontSize:12,color:"#6b7280",marginTop:6,whiteSpace:"pre-wrap"}}>{task.note}</div>}</div><div style={{display:"flex",gap:4,flexShrink:0,flexWrap:"wrap",justifyContent:"flex-end"}}><button style={S.btnSm("#f59e0b","#fff")} onClick={()=>setEdit({...task})}>✎</button>{task.status!=="today"&&<button style={S.btnSm()} onClick={()=>updateTask(task.id,{status:"today"})}>今天</button>}{task.status!=="next"&&<button style={S.btnSm()} onClick={()=>updateTask(task.id,{status:"next"})}>近期</button>}{task.status!=="waiting"&&<button style={S.btnSm()} onClick={()=>updateTask(task.id,{status:"waiting"})}>等待</button>}<button style={S.btnSm("#059669","#fff")} onClick={()=>updateTask(task.id,{status:"done"})}>✓</button><button style={S.btnSm("#dc2626","#fff")} onClick={()=>removeTask(task.id)}>删</button></div></div>
  </div>};
  const Section=({status})=>{const s=statusDef(status); const arr=sorted(tasks.filter(t=>t.status===status)); if(!arr.length&&status!=="inbox")return null; return <div style={{marginBottom:16}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}><div style={{fontSize:14,fontWeight:850,color:"#111827"}}>{s.label} <span style={{color:"#9ca3af",fontSize:12}}>{arr.length}</span></div>{status==="inbox"&&arr.length>0&&<button style={S.btnSm("#2563eb","#fff")} onClick={openOrganize}>整理收件箱</button>}</div>{arr.length?arr.map(t=><TaskCard key={t.id} task={t}/>):<div style={{textAlign:"center",fontSize:12,color:"#9ca3af",padding:18,background:"#f9fafb",borderRadius:9}}>收件箱为空</div>}</div>};
  return <>
    <div style={S.card}><CardTitle sub="想到什么先扔进来，不用选项目、不用判断急不急。">快速扔待办</CardTitle><div style={{display:"flex",gap:8}}><input style={S.input} placeholder="快速扔一个待办……" value={quick} onChange={e=>setQuick(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addQuick()}/><button style={S.btn()} onClick={addQuick}>+</button></div></div>
    <div style={S.card}><div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>{TASK_STATUS.filter(s=>s.key!=="dropped"&&s.key!=="done").map(s=><button key={s.key} style={S.btnSm(mode===s.key?s.color:"#f3f4f6",mode===s.key?"#fff":"#374151")} onClick={()=>setMode(s.key)}>{s.label} {counts[s.key]||0}</button>)}<button style={S.btnSm(mode==="daily"?"#111827":"#f3f4f6",mode==="daily"?"#fff":"#374151")} onClick={()=>setMode("daily")}>日常查看</button><button style={S.btnSm(mode==="project"?"#111827":"#f3f4f6",mode==="project"?"#fff":"#374151")} onClick={()=>setMode("project")}>按项目查看</button></div>
      {mode==="daily"&&<><Section status="today"/><Section status="next"/><Section status="waiting"/><Section status="inbox"/><Section status="someday"/><details><summary style={{fontSize:13,fontWeight:750,color:"#6b7280",cursor:"pointer"}}>已完成 {counts.done||0}</summary><div style={{marginTop:8}}>{sorted(tasks.filter(t=>t.status==="done")).map(t=><TaskCard key={t.id} task={t}/>)}</div></details></>}
      {TASK_STATUS.some(s=>s.key===mode)&&mode!=="daily"&&mode!=="project"&&<Section status={mode}/>} 
      {mode==="project"&&<div>{[...projects,{id:null,name:"无归属项目"}].map(p=>{const arr=sorted(active.filter(t=>p.id?String(t.projectId)===String(p.id):!t.projectId)); if(!arr.length)return null; return <div key={p.id||"none"} style={{marginBottom:14}}><div style={{fontSize:14,fontWeight:850,borderBottom:"2px solid #e5e7eb",paddingBottom:6,marginBottom:8}}>{p.name}</div>{arr.map(t=><TaskCard key={t.id} task={t}/>)}</div>})}</div>}
    </div>
    {organize&&<OrganizeModal task={organize} setTask={setOrganize} projects={projects} onSave={saveOrganize} onClose={()=>setOrganize(null)} remaining={inbox.length}/>} 
    {edit&&<TaskEditModal task={edit} setTask={setEdit} projects={projects} onSave={()=>{updateTask(edit.id,edit);setEdit(null)}} onDelete={()=>{removeTask(edit.id);setEdit(null)}} onClose={()=>setEdit(null)}/>} 
  </>
}

function TaskEditModal({task,setTask,projects,onSave,onDelete,onClose}){return <div style={S.modal} onClick={e=>e.target===e.currentTarget&&onClose()}><div style={S.modalBox}><CardTitle>编辑待办</CardTitle><label style={S.label}>标题</label><input style={{...S.input,marginBottom:10}} value={task.title} onChange={e=>setTask({...task,title:e.target.value})}/><label style={S.label}>状态</label><select style={{...S.select,marginBottom:10}} value={task.status} onChange={e=>setTask({...task,status:e.target.value})}>{TASK_STATUS.map(s=><option key={s.key} value={s.key}>{s.label}</option>)}</select><label style={S.label}>项目</label><div style={{marginBottom:10}}><ProjectSelect projects={projects} value={task.projectId} onChange={v=>setTask({...task,projectId:v})}/></div><label style={S.label}>下一步</label><input style={{...S.input,marginBottom:10}} value={task.nextAction||""} onChange={e=>setTask({...task,nextAction:e.target.value})}/><label style={S.label}>等待对象</label><input style={{...S.input,marginBottom:10}} value={task.waitingFor||""} onChange={e=>setTask({...task,waitingFor:e.target.value})}/><label style={S.label}>截止日</label><input type="date" style={{...S.input,marginBottom:10}} value={task.due||""} onChange={e=>setTask({...task,due:e.target.value||null})}/><label style={S.label}>备注</label><textarea style={{...S.textarea,marginBottom:12}} value={task.note||""} onChange={e=>setTask({...task,note:e.target.value})}/><div style={{display:"flex",gap:8}}><button style={{...S.btn(),flex:1}} onClick={onSave}>保存</button><button style={{...S.btn("#dc2626"),flex:1}} onClick={onDelete}>删除</button><button style={{...S.btn("#f3f4f6","#374151"),flex:1}} onClick={onClose}>取消</button></div></div></div>}

function ProjectsTab({data,save}){
  const projects=data.projects||[];
  const visibleProjects=activeProjects(projects);
  const [selected,setSelected]=useState(visibleProjects[0]?.id||null);
  const [newName,setNewName]=useState("");
  const [mode,setMode]=useState("detail");
  const [editing,setEditing]=useState(null);
  const [showArchived,setShowArchived]=useState(false);

  const p=visibleProjects.find(x=>String(x.id)===String(selected))||visibleProjects[0];
  const statusLabel=key=>PROJECT_STATUS.find(s=>s.key===key)?.label||key;
  const statusColor=key=>({active:"#059669",paused:"#d97706",done:"#2563eb",archived:"#64748b"}[key]||"#64748b");
  const updateProject=(id,patch)=>save({...data,projects:projects.map(x=>String(x.id)===String(id)?{...x,...patch,updatedAt:nowTs()}:x)});
  const add=()=>{
    if(!newName.trim())return;
    const np={id:uid(),name:newName.trim(),type:"主线",status:"active",goal:"",currentState:"",nextAction:"",stakeholders:[],tags:[],createdAt:today(),updatedAt:nowTs()};
    save({...data,projects:[np,...projects]});
    setSelected(np.id); setNewName(""); setMode("detail");
  };
  const remove=id=>{
    if(!confirm("确定删除这个项目？相关日志、待办、知识不会删除，只会变成无归属。"))return;
    const nextVisible=visibleProjects.find(x=>String(x.id)!==String(id));
    setSelected(nextVisible?.id||null);
    save({...data,
      projects:softDelete(projects,id),
      tasks:(data.tasks||[]).map(t=>String(t.projectId)===String(id)?{...t,projectId:null,updatedAt:nowTs()}:t),
      logs:Object.fromEntries(Object.entries(data.logs||{}).map(([d,arr])=>[d,(arr||[]).map(e=>String(e.projectId)===String(id)?{...e,projectId:null,updatedAt:nowTs()}:e)])),
      knowledge:{domains:(data.knowledge?.domains||[]).map(dom=>({...dom,themes:(dom.themes||[]).map(th=>({...th,entries:(th.entries||[]).map(e=>String(e.projectId)===String(id)?{...e,projectId:null,updatedAt:nowTs()}:e)}))}))}
    });
  };
  const restore=id=>save({...data,projects:projects.map(x=>String(x.id)===String(id)?{...x,_deleted:false,status:x.status||"active",updatedAt:nowTs()}:x)});
  const relatedFor=proj=>{
    if(!proj)return {tasks:[],logs:[],knowledge:[]};
    const tasks=(data.tasks||[]).filter(t=>String(t.projectId)===String(proj.id)&&!["done","dropped"].includes(t.status));
    const logs=[];
    for(const [d,arr] of Object.entries(data.logs||{})){for(const e of arr||[]){if(String(e.projectId)===String(proj.id)) logs.push({...e,date:d})}}
    const knowledge=[];
    for(const dom of data.knowledge?.domains||[]){for(const th of dom.themes||[]){for(const e of th.entries||[]){if(String(e.projectId)===String(proj.id)&&!e._deleted) knowledge.push({...e,themeName:th.name,domainId:dom.id})}}}
    return {tasks,logs,knowledge};
  };
  const related=relatedFor(p);
  const organizeProjects=(showArchived?projects:visibleProjects).filter(x=>showArchived?!false:!x._deleted);

  const ProjectEditFields=({proj,inline=false})=> proj&&<div style={{padding:inline?0:12,background:inline?"transparent":"#f9fafb",borderRadius:10,marginBottom:inline?0:12}}>
    <label style={S.label}>项目名称</label>
    <input style={{...S.input,marginBottom:8}} value={proj.name} onChange={e=>updateProject(proj.id,{name:e.target.value})}/>
    <div style={{...S.row,marginBottom:8}}>
      <select style={S.select} value={proj.type} onChange={e=>updateProject(proj.id,{type:e.target.value})}>{PROJECT_TYPES.map(x=><option key={x} value={x}>{x}</option>)}</select>
      <select style={S.select} value={proj.status} onChange={e=>updateProject(proj.id,{status:e.target.value})}>{PROJECT_STATUS.map(x=><option key={x.key} value={x.key}>{x.label}</option>)}</select>
    </div>
    <label style={S.label}>目标</label>
    <textarea style={{...S.textarea,marginBottom:8}} value={proj.goal||""} onChange={e=>updateProject(proj.id,{goal:e.target.value})}/>
    <label style={S.label}>当前状态</label>
    <textarea style={{...S.textarea,marginBottom:8}} value={proj.currentState||""} onChange={e=>updateProject(proj.id,{currentState:e.target.value})}/>
    <label style={S.label}>下一步</label>
    <textarea style={{...S.textarea,marginBottom:8}} value={proj.nextAction||""} onChange={e=>updateProject(proj.id,{nextAction:e.target.value})}/>
  </div>;

  return <>
    <div style={S.card}>
      <CardTitle sub="项目用于整理长期主线。先在这里把项目清干净，再去待办池给事项归项目。">项目</CardTitle>
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <input style={S.input} placeholder="新建项目，例如：电商条线财务闭环" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}/>
        <button style={S.btn()} onClick={add}>+</button>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        <button style={S.btnSm(mode==="detail"?"#2563eb":"#f3f4f6",mode==="detail"?"#fff":"#374151")} onClick={()=>setMode("detail")}>项目档案</button>
        <button style={S.btnSm(mode==="organize"?"#2563eb":"#f3f4f6",mode==="organize"?"#fff":"#374151")} onClick={()=>setMode("organize")}>整理项目</button>
      </div>
    </div>

    {mode==="organize"&&<div style={S.card}>
      <CardTitle sub="这里就是整理项目的地方：改名、改类型、暂停/归档、删除。删除只会解除关联，不会删除日志/待办/知识。">整理项目</CardTitle>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,gap:8}}>
        <div style={{fontSize:12,color:"#9ca3af"}}>当前显示 {organizeProjects.filter(x=>showArchived||!x._deleted).length} 个项目</div>
        <button style={S.btnSm(showArchived?"#111827":"#f3f4f6",showArchived?"#fff":"#374151")} onClick={()=>setShowArchived(v=>!v)}>{showArchived?"隐藏已删除":"显示已删除"}</button>
      </div>
      {organizeProjects.length===0&&<div style={{fontSize:12,color:"#9ca3af",padding:14,background:"#f9fafb",borderRadius:10}}>暂无项目</div>}
      {organizeProjects.map(proj=>{
        const r=relatedFor(proj);
        const isDeleted=!!proj._deleted;
        const open=String(editing)===String(proj.id);
        return <div key={proj.id} style={{padding:"10px 12px",background:isDeleted?"#fafafa":"#f9fafb",border:"1px solid #e5e7eb",borderRadius:10,marginBottom:8,opacity:isDeleted?.55:1}}>
          <div style={{display:"flex",justifyContent:"space-between",gap:8,alignItems:"flex-start"}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:850,wordBreak:"break-word"}}>{proj.name}</div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:5}}>
                <span style={S.badge("#475569")}>{proj.type}</span>
                <span style={S.badge(statusColor(proj.status))}>{statusLabel(proj.status)}</span>
                <span style={{fontSize:11,color:"#6b7280"}}>待办 {r.tasks.length} · 日志 {r.logs.length} · 知识 {r.knowledge.length}</span>
                {isDeleted&&<span style={{fontSize:11,color:"#dc2626"}}>已删除</span>}
              </div>
            </div>
            <div style={{display:"flex",gap:4,flexShrink:0,flexWrap:"wrap",justifyContent:"flex-end"}}>
              {!isDeleted&&<button style={S.btnSm("#2563eb","#fff")} onClick={()=>{setSelected(proj.id);setMode("detail")}}>打开</button>}
              {!isDeleted&&<button style={S.btnSm("#f59e0b","#fff")} onClick={()=>setEditing(open?null:proj.id)}>{open?"收起":"编辑"}</button>}
              {!isDeleted&&proj.status!=="paused"&&<button style={S.btnSm()} onClick={()=>updateProject(proj.id,{status:"paused"})}>暂停</button>}
              {!isDeleted&&proj.status!=="active"&&<button style={S.btnSm("#059669","#fff")} onClick={()=>updateProject(proj.id,{status:"active"})}>推进</button>}
              {!isDeleted&&proj.status!=="archived"&&<button style={S.btnSm("#64748b","#fff")} onClick={()=>updateProject(proj.id,{status:"archived"})}>归档</button>}
              {isDeleted?<button style={S.btnSm("#059669","#fff")} onClick={()=>restore(proj.id)}>恢复</button>:<button style={S.btnSm("#dc2626","#fff")} onClick={()=>remove(proj.id)}>删除</button>}
            </div>
          </div>
          {open&&!isDeleted&&<div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #e5e7eb"}}><ProjectEditFields proj={proj} inline={true}/></div>}
        </div>
      })}
    </div>}

    {mode==="detail"&&<div style={S.card}>
      <CardTitle sub="项目档案页：看某条主线的目标、状态、下一步，以及它关联到的待办/日志/知识。">项目档案</CardTitle>
      <div style={{display:"flex",gap:8,overflowX:"auto",marginBottom:14,paddingBottom:4}}>
        {visibleProjects.map(x=><button key={x.id} style={S.btnSm(String(p?.id)===String(x.id)?"#2563eb":"#f3f4f6",String(p?.id)===String(x.id)?"#fff":"#374151")} onClick={()=>setSelected(x.id)}>{x.name}</button>)}
      </div>
      {!p&&<div style={{fontSize:12,color:"#9ca3af",padding:14,background:"#f9fafb",borderRadius:10}}>暂无项目。可以先在上方新建一个项目。</div>}
      {p&&<div>
        <ProjectEditFields proj={p}/>
        <button style={{...S.btnSm("#dc2626","#fff"),marginBottom:12}} onClick={()=>remove(p.id)}>删除项目</button>
        <RelSection title="相关待办" empty="暂无相关待办">{related.tasks.map(t=><div key={t.id} style={{fontSize:13,padding:"7px 0",borderBottom:"1px solid #f3f4f6"}}><StatusPill status={t.status}/> {t.title}</div>)}</RelSection>
        <RelSection title="相关日志" empty="暂无相关日志">{related.logs.sort((a,b)=>String(b.date).localeCompare(String(a.date))).slice(0,20).map(e=><div key={e.id} style={{fontSize:13,padding:"7px 0",borderBottom:"1px solid #f3f4f6"}}>{e.date} · {e.name} · {fmtMins(e.mins)}</div>)}</RelSection>
        <RelSection title="相关知识" empty="暂无相关知识">{related.knowledge.map(e=><div key={e.id} style={{fontSize:13,padding:"7px 0",borderBottom:"1px solid #f3f4f6"}}><b>{e.title||e.themeName}</b><div style={{fontSize:12,color:"#6b7280",marginTop:3}}>{e.entryType} · {e.confidence}</div></div>)}</RelSection>
      </div>}
    </div>}
  </>;
}
function RelSection({title,empty,children}){const has=React.Children.count(children)>0; return <div style={{marginTop:12}}><div style={{fontSize:14,fontWeight:850,marginBottom:6}}>{title}</div>{has?<div>{children}</div>:<div style={{fontSize:12,color:"#9ca3af",padding:12,background:"#f9fafb",borderRadius:9}}>{empty}</div>}</div>}

function renderMd(text){
  if(!text)return null; return text.split("\n").map((line,i)=>{
    if(line.startsWith("### "))return <div key={i} style={{fontWeight:750,fontSize:13,margin:"8px 0 3px"}}>{line.slice(4)}</div>;
    if(line.startsWith("## "))return <div key={i} style={{fontWeight:850,fontSize:14,margin:"9px 0 4px"}}>{line.slice(3)}</div>;
    if(line.startsWith("# "))return <div key={i} style={{fontWeight:900,fontSize:15,margin:"10px 0 5px"}}>{line.slice(2)}</div>;
    if(line.trim()==="")return <div key={i} style={{height:6}}/>;
    return <div key={i} style={{fontSize:13,lineHeight:1.7,color:"#374151",whiteSpace:"pre-wrap"}}>{line}</div>;
  })
}
function KnowledgeTab({data,save}){
  const [view,setView]=useState("topic"); const [search,setSearch]=useState(""); const [addThemeDomain,setAddThemeDomain]=useState(null); const [themeName,setThemeName]=useState(""); const [addEntry,setAddEntry]=useState(null); const [editEntry,setEditEntry]=useState(null);
  const domains=data.knowledge.domains||[];
  const saveKnow=k=>save({...data,knowledge:k});
  const addTheme=()=>{if(!themeName.trim()||!addThemeDomain)return; const th={id:uid(),name:themeName.trim(),entries:[],updatedAt:nowTs()}; saveKnow({domains:domains.map(d=>d.id===addThemeDomain?{...d,themes:[...(d.themes||[]),th]}:d)}); setThemeName("");setAddThemeDomain(null);};
  const removeTheme=(domainId,themeId)=>saveKnow({domains:domains.map(d=>d.id===domainId?{...d,themes:softDelete(d.themes,themeId)}:d)});
  const addEntrySave=(entry)=>{const e={...entry,id:uid(),createdAt:today(),updatedAt:nowTs()}; saveKnow({domains:domains.map(d=>d.id===entry.domainId?{...d,themes:d.themes.map(t=>String(t.id)===String(entry.themeId)?{...t,entries:[...(t.entries||[]),e],updatedAt:nowTs()}:t)}:d)}); setAddEntry(null);};
  const saveEdit=()=>{const ed=editEntry; saveKnow({domains:domains.map(d=>d.id===ed.domainId?{...d,themes:d.themes.map(t=>String(t.id)===String(ed.themeId)?{...t,entries:t.entries.map(e=>String(e.id)===String(ed.id)?{...ed,updatedAt:nowTs()}:e),updatedAt:nowTs()}:t)}:d)}); setEditEntry(null);};
  const removeEntry=(domainId,themeId,id)=>saveKnow({domains:domains.map(d=>d.id===domainId?{...d,themes:d.themes.map(t=>String(t.id)===String(themeId)?{...t,entries:softDelete(t.entries,id)}:t)}:d)});
  const flat=[]; for(const d of domains){for(const t of d.themes||[]){for(const e of t.entries||[]){flat.push({...e,domainId:d.id,themeId:t.id,themeName:t.name,domainLabel:DOMAINS.find(x=>x.id===d.id)?.label||d.id})}}}
  const matchText=x=>!search||JSON.stringify(x).includes(search);
  return <><div style={S.card}><div style={{display:"flex",gap:8,marginBottom:10}}><button style={S.btnSm(view==="topic"?"#2563eb":"#f3f4f6",view==="topic"?"#fff":"#374151")} onClick={()=>setView("topic")}>按主题</button><button style={S.btnSm(view==="project"?"#2563eb":"#f3f4f6",view==="project"?"#fff":"#374151")} onClick={()=>setView("project")}>按项目</button></div><input style={S.input} placeholder="搜索知识库…" value={search} onChange={e=>setSearch(e.target.value)}/></div>{view==="topic"&&domains.map(d=>{const domainDef=DOMAINS.find(x=>x.id===d.id); const themes=(d.themes||[]).filter(t=>!t._deleted&&matchText(t)); if(search&&!themes.length)return null; return <div key={d.id} style={S.card}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div style={{fontSize:14,fontWeight:900}}>{domainDef?.label}</div><button style={S.btnSm("#2563eb","#fff")} onClick={()=>setAddThemeDomain(d.id)}>+ 主题</button></div>{addThemeDomain===d.id&&<div style={{display:"flex",gap:8,marginBottom:10}}><input style={S.input} placeholder="新主题名称" value={themeName} onChange={e=>setThemeName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTheme()}/><button style={S.btn()} onClick={addTheme}>✓</button></div>}{themes.map(t=><details key={t.id} open style={{marginBottom:8,background:"#f9fafb",borderRadius:10,padding:"10px 12px"}}><summary style={{fontWeight:800,cursor:"pointer"}}>{t.name} <span style={{fontSize:11,color:"#9ca3af"}}>{(t.entries||[]).filter(e=>!e._deleted).length}条</span></summary><div style={{marginTop:8,display:"flex",gap:6}}><button style={S.btnSm("#2563eb","#fff")} onClick={()=>setAddEntry({domainId:d.id,themeId:t.id,title:"",content:"",projectId:null,tags:[],entryType:"判断框架",confidence:"可复用"})}>+ 条目</button><button style={S.btnSm("#dc2626","#fff")} onClick={()=>removeTheme(d.id,t.id)}>删主题</button></div>{(t.entries||[]).filter(e=>!e._deleted&&matchText(e)).map(e=><KnowledgeEntry key={e.id} e={{...e,domainId:d.id,themeId:t.id,themeName:t.name}} projects={activeProjects(data.projects)} onEdit={()=>setEditEntry({...e,domainId:d.id,themeId:t.id})} onDelete={()=>removeEntry(d.id,t.id,e.id)}/>)}</details>)}</div>})}{view==="project"&&<div style={S.card}>{[...activeProjects(data.projects),{id:null,name:"无归属项目"}].map(p=>{const arr=flat.filter(e=>p.id?String(e.projectId)===String(p.id):!e.projectId).filter(matchText); if(!arr.length)return null; return <div key={p.id||"none"} style={{marginBottom:14}}><div style={{fontSize:14,fontWeight:900,borderBottom:"2px solid #e5e7eb",paddingBottom:6,marginBottom:8}}>{p.name}</div>{arr.map(e=><KnowledgeEntry key={e.id} e={e} projects={activeProjects(data.projects)} onEdit={()=>setEditEntry(e)} onDelete={()=>removeEntry(e.domainId,e.themeId,e.id)}/>)}</div>})}</div>}{addEntry&&<KnowledgeEntryModal entry={addEntry} setEntry={setAddEntry} projects={activeProjects(data.projects)} domains={domains} onSave={()=>addEntrySave(addEntry)} onClose={()=>setAddEntry(null)}/>} {editEntry&&<KnowledgeEntryModal entry={editEntry} setEntry={setEditEntry} projects={activeProjects(data.projects)} domains={domains} onSave={saveEdit} onClose={()=>setEditEntry(null)}/>}</>;
}
function KnowledgeEntry({e,projects,onEdit,onDelete}){const p=projects.find(x=>String(x.id)===String(e.projectId));return <div style={{padding:"10px 0",borderBottom:"1px solid #e5e7eb"}}><div style={{display:"flex",justifyContent:"space-between",gap:8}}><div style={{minWidth:0}}><div style={{fontSize:13,fontWeight:850}}>{e.title||e.themeName}</div><div style={{fontSize:11,color:"#9ca3af",marginTop:3}}>{e.entryType} · {e.confidence}{p?` · ${p.name}`:""}</div></div><div style={{display:"flex",gap:5}}><button style={S.btnSm("#f59e0b","#fff")} onClick={onEdit}>✎</button><button style={S.btnSm("#dc2626","#fff")} onClick={onDelete}>删</button></div></div><div style={{marginTop:6}}>{renderMd(e.content)}</div></div>}
function KnowledgeEntryModal({entry,setEntry,projects,domains,onSave,onClose}){const themes=(domains.find(d=>d.id===entry.domainId)?.themes||[]).filter(t=>!t._deleted);return <div style={S.modal} onClick={e=>e.target===e.currentTarget&&onClose()}><div style={S.modalBox}><CardTitle>知识条目</CardTitle><label style={S.label}>标题</label><input style={{...S.input,marginBottom:8}} value={entry.title||""} onChange={e=>setEntry({...entry,title:e.target.value})}/><div style={{...S.row,marginBottom:8}}><select style={S.select} value={entry.domainId} onChange={e=>{const nd=e.target.value;const th=(domains.find(d=>d.id===nd)?.themes||[])[0];setEntry({...entry,domainId:nd,themeId:th?.id||null})}}>{DOMAINS.map(d=><option key={d.id} value={d.id}>{d.label}</option>)}</select><select style={S.select} value={entry.themeId||""} onChange={e=>setEntry({...entry,themeId:e.target.value})}>{themes.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}</select></div><label style={S.label}>关联项目</label><div style={{marginBottom:8}}><ProjectSelect projects={projects} value={entry.projectId} onChange={v=>setEntry({...entry,projectId:v})}/></div><div style={{...S.row,marginBottom:8}}><select style={S.select} value={entry.entryType} onChange={e=>setEntry({...entry,entryType:e.target.value})}>{ENTRY_TYPES.map(x=><option key={x} value={x}>{x}</option>)}</select><select style={S.select} value={entry.confidence} onChange={e=>setEntry({...entry,confidence:e.target.value})}>{CONFIDENCE.map(x=><option key={x} value={x}>{x}</option>)}</select></div><label style={S.label}>内容</label><textarea style={{...S.textarea,minHeight:180,marginBottom:12}} value={entry.content||""} onChange={e=>setEntry({...entry,content:e.target.value})} placeholder="支持简单 Markdown"/><div style={{display:"flex",gap:8}}><button style={{...S.btn(),flex:1}} onClick={onSave}>保存</button><button style={{...S.btn("#f3f4f6","#374151"),flex:1}} onClick={onClose}>取消</button></div></div></div>}

function ExportModal({data,defaultDate,onClose}){const [mode,setMode]=useState("all");const [from,setFrom]=useState(defaultDate);const [to,setTo]=useState(today());const [msg,setMsg]=useState("");const doExport=()=>{let payload=data; if(mode==="range"){payload={...data,logs:Object.fromEntries(Object.entries(data.logs||{}).filter(([d])=>d>=from&&d<=to)),dailyNotes:Object.fromEntries(Object.entries(data.dailyNotes||{}).filter(([d])=>d>=from&&d<=to))}}; if(mode==="today"){payload={...data,logs:{[defaultDate]:data.logs[defaultDate]||[]},dailyNotes:{[defaultDate]:data.dailyNotes?.[defaultDate]||""}}}; const blob=new Blob([JSON.stringify({...payload,exportedAt:new Date().toISOString()},null,2)],{type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`work-tracker-v3-${mode==="all"?"all":mode==="today"?defaultDate:`${from}_${to}`}.json`; a.click(); onClose();}; return <div style={S.modal} onClick={e=>e.target===e.currentTarget&&onClose()}><div style={S.modalBox}><CardTitle>导出数据</CardTitle><div style={{display:"flex",gap:8,marginBottom:10}}>{[["all","全部"],["today","当天"],["range","范围"]].map(([k,l])=><button key={k} style={{...S.btn(mode===k?"#2563eb":"#f3f4f6",mode===k?"#fff":"#374151"),flex:1}} onClick={()=>setMode(k)}>{l}</button>)}</div>{mode==="range"&&<div style={{...S.row,marginBottom:10}}><input type="date" style={S.input} value={from} onChange={e=>setFrom(e.target.value)}/><input type="date" style={S.input} value={to} onChange={e=>setTo(e.target.value)}/></div>}{msg&&<div style={{fontSize:12,color:"#dc2626"}}>{msg}</div>}<div style={{display:"flex",gap:8}}><button style={{...S.btn(),flex:1}} onClick={doExport}>导出明文</button><button style={{...S.btn("#f3f4f6","#374151"),flex:1}} onClick={onClose}>取消</button></div></div></div>}

function SettingsTab({data,save,ghToken,setGhToken,ghGistId,encPwd,setEncPwd,syncStatus,syncMsg,isConfigured,manualSync,connectGist,disconnect}){
  const [mode,setMode]=useState("new"); const [existing,setExisting]=useState(""); const [show,setShow]=useState(false);
  const importData=e=>{const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=ev=>{try{const d=normalizeData(JSON.parse(ev.target.result)); save(mergeData(d,data)); alert("导入成功，已合并");}catch(err){alert("导入失败："+err.message)}}; r.readAsText(f); e.target.value="";};
  const exportAll=()=>{const blob=new Blob([JSON.stringify({...data,exportedAt:new Date().toISOString()},null,2)],{type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="work-tracker-v3-all.json"; a.click();};
  return <><div style={S.card}><CardTitle sub="数据会在本地加密后上传到 GitHub Gist。密码丢失无法解密。">GitHub Gist 同步</CardTitle>{isConfigured&&<div style={{fontSize:12,color:"#059669",background:"#f0fdf4",padding:10,borderRadius:9,marginBottom:10}}>已连接：{ghGistId.slice(0,8)}…</div>}<label style={S.label}>GitHub Token</label><input style={{...S.input,marginBottom:8}} type={show?"text":"password"} value={ghToken} onChange={e=>setGhToken(e.target.value)} disabled={isConfigured} placeholder="ghp_xxx"/><label style={S.label}>加密密码</label><input style={{...S.input,marginBottom:8}} type={show?"text":"password"} value={encPwd} onChange={e=>setEncPwd(e.target.value)} disabled={isConfigured} placeholder="自定义加密密码"/><button style={{...S.btnSm(),marginBottom:10}} onClick={()=>setShow(!show)}>{show?"隐藏":"显示"}</button>{syncMsg&&<div style={{fontSize:12,color:syncStatus==="error"?"#dc2626":"#059669",marginBottom:10}}>{syncMsg}</div>}{!isConfigured?<><div style={{display:"flex",gap:8,marginBottom:10}}><button style={{...S.btn(mode==="new"?"#2563eb":"#f3f4f6",mode==="new"?"#fff":"#374151"),flex:1}} onClick={()=>setMode("new")}>新建 Gist</button><button style={{...S.btn(mode==="existing"?"#2563eb":"#f3f4f6",mode==="existing"?"#fff":"#374151"),flex:1}} onClick={()=>setMode("existing")}>使用已有</button></div>{mode==="existing"&&<input style={{...S.input,marginBottom:10}} placeholder="已有 Gist ID" value={existing} onChange={e=>setExisting(e.target.value)}/>}<button style={S.btnFull()} onClick={()=>connectGist(mode,existing)}>{mode==="new"?"新建并连接":"连接已有 Gist"}</button></>:<div style={{display:"flex",gap:8}}><button style={{...S.btn(),flex:2}} onClick={manualSync}>{syncStatus==="syncing"?"同步中…":"立即同步"}</button><button style={{...S.btn("#dc2626"),flex:1}} onClick={disconnect}>断开</button></div>}</div><div style={S.card}><CardTitle>本地备份</CardTitle><div style={{display:"flex",gap:8}}><button style={{...S.btn(),flex:1}} onClick={exportAll}>导出全部</button><label style={{...S.btn("#f3f4f6","#374151"),flex:1,textAlign:"center"}}>导入 JSON<input type="file" accept=".json" onChange={importData} style={{display:"none"}}/></label></div></div></>;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
