<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

// ── Constants ─────────────────────────────────────────────
const CATS = [
  {key:"core",    label:"核心价值", color:"#2563eb", desc:"管理分析、Agent开发、制度建设"},
  {key:"routine", label:"常规运营", color:"#059669", desc:"日常记账、报税、审批"},
  {key:"fragment",label:"碎片响应", color:"#d97706", desc:"临时沟通、被打断、救火"},
];
const URGENCY = ["不急","一般","紧急"];
const VALUE   = ["低","中","高"];
const today   = () => new Date().toISOString().slice(0,10);
const fmtMins = m => m >= 60 ? `${m/60}h` : `${m}m`;
const daysBetween = d => Math.floor((new Date(today())-new Date(d))/86400000);

// ── LocalStorage ──────────────────────────────────────────
const LS = {
  get:(k)=>{ try{const v=localStorage.getItem(k); return v?JSON.parse(v):null}catch{return null} },
  set:(k,v)=>{ try{localStorage.setItem(k,JSON.stringify(v))}catch{} },
  del:(k)=>{ try{localStorage.removeItem(k)}catch{} },
};

// ── Crypto ────────────────────────────────────────────────
async function deriveKey(pwd){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey("raw",enc.encode(pwd),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:enc.encode("wt-salt-v1"),iterations:100000,hash:"SHA-256"},
    km,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);
}
async function encryptStr(text,pwd){
  const key=await deriveKey(pwd);
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const buf=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,new TextEncoder().encode(text));
  const out=new Uint8Array(12+buf.byteLength);
  out.set(iv);out.set(new Uint8Array(buf),12);
  return btoa(String.fromCharCode(...out));
}
async function decryptStr(b64,pwd){
  const key=await deriveKey(pwd);
  const buf=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
  const dec=await crypto.subtle.decrypt({name:"AES-GCM",iv:buf.slice(0,12)},key,buf.slice(12));
  return new TextDecoder().decode(dec);
}

// ── GitHub Gist ───────────────────────────────────────────
const GH = {
  async create(token,content){
    const r=await fetch("https://api.github.com/gists",{
      method:"POST",
      headers:{Authorization:`token ${token}`,"Content-Type":"application/json"},
      body:JSON.stringify({description:"work-tracker-data",public:false,files:{"wt.txt":{content}}})
    });
    const j=await r.json();
    if(!j.id) throw new Error(j.message||"创建失败");
    return j.id;
  },
  async update(token,id,content){
    const r=await fetch(`https://api.github.com/gists/${id}`,{
      method:"PATCH",
      headers:{Authorization:`token ${token}`,"Content-Type":"application/json"},
      body:JSON.stringify({files:{"wt.txt":{content}}})
    });
    if(!r.ok) throw new Error("更新失败");
  },
  async fetch(token,id){
    const r=await fetch(`https://api.github.com/gists/${id}`,{
      headers:{Authorization:`token ${token}`}
    });
    const j=await r.json();
    return j.files?.["wt.txt"]?.content||null;
  }
};

// ── Styles ────────────────────────────────────────────────
const S = {
  app:{maxWidth:520,margin:"0 auto",padding:"16px 12px",minHeight:"100vh",background:"#f5f6fa"},
  card:{background:"#fff",borderRadius:12,padding:16,marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,.07)"},
  input:{width:"100%",padding:"10px 12px",background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:8,color:"#1a1d27",fontSize:14,outline:"none"},
  textarea:{width:"100%",padding:"10px 12px",background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:8,color:"#1a1d27",fontSize:13,outline:"none",minHeight:60},
  select:{padding:"10px 12px",background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:8,color:"#1a1d27",fontSize:13,outline:"none",width:"100%"},
  btn:(bg,c)=>({padding:"10px 0",background:bg||"#2563eb",color:c||"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",width:"100%"}),
  btnSm:(bg,c)=>({padding:"4px 10px",background:bg||"#e5e7eb",color:c||(bg&&bg!=="#e5e7eb"?"#fff":"#374151"),border:"none",borderRadius:6,fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}),
  label:{fontSize:11,color:"#9ca3af",fontWeight:600,marginBottom:6,display:"block",textTransform:"uppercase",letterSpacing:1},
  row:{display:"flex",gap:8,alignItems:"flex-start"},
  badge:(bg)=>({display:"inline-block",padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:600,background:bg,color:"#fff",marginRight:4}),
  tabs:{display:"flex",background:"#e5e7eb",borderRadius:10,padding:3,marginBottom:20},
  tab:(a)=>({flex:1,padding:"9px 0",textAlign:"center",fontSize:11,fontWeight:600,border:"none",borderRadius:8,cursor:"pointer",background:a?"#2563eb":"transparent",color:a?"#fff":"#6b7280"}),
  insight:{padding:"10px 14px",background:"#fffbeb",borderLeft:"3px solid #d97706",borderRadius:"0 8px 8px 0",marginBottom:8,fontSize:13,color:"#78350f"},
  modal:{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16},
  modalBox:{background:"#fff",borderRadius:16,padding:20,width:"100%",maxWidth:480,maxHeight:"80vh",overflowY:"auto"},
};

// ── Main App ──────────────────────────────────────────────
function App(){
  const [tab,setTab]   = useState("log");
  const [data,setData] = useState({logs:{},pool:{projects:[],items:[]},knowledge:{themes:[]}});
  const [loading,setLoading] = useState(true);

  // sync state
  const [ghToken,setGhToken]   = useState("");
  const [ghGistId,setGhGistId] = useState("");
  const [encPwd,setEncPwd]     = useState("");
  const [syncStatus,setSyncStatus] = useState("unconfigured");
  const [syncMsg,setSyncMsg]   = useState("");
  const [lastSynced,setLastSynced] = useState("");
  const [connecting,setConnecting] = useState(false);
  const isConfigured = !!(ghToken&&ghGistId&&encPwd);

  // load
  useEffect(()=>{
    (async()=>{
      const saved = LS.get("wt-data");
      if(saved) setData(saved);
      const token  = LS.get("gh-token")||"";
      const gistId = LS.get("gh-gist-id")||"";
      const pwd    = LS.get("enc-pwd")||"";
      const ls_    = LS.get("last-synced")||"";
      setGhToken(token); setGhGistId(gistId); setEncPwd(pwd); setLastSynced(ls_);
      if(token&&gistId&&pwd){
        setSyncStatus("syncing");
        try{
          const raw=await GH.fetch(token,gistId);
          if(raw){
            const plain=await decryptStr(raw,pwd);
            setData(JSON.parse(plain));
          }
          const now=new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"});
          setLastSynced(now); LS.set("last-synced",now);
          setSyncStatus("synced");
        }catch{setSyncStatus("error");setSyncMsg("拉取失败，使用本地数据");}
      }
      setLoading(false);
    })();
  },[]);

  const save = useCallback(async(newData)=>{
    setData(newData);
    LS.set("wt-data",newData);
    if(ghToken&&ghGistId&&encPwd){
      setSyncStatus("syncing");
      try{
        const enc=await encryptStr(JSON.stringify(newData),encPwd);
        await GH.update(ghToken,ghGistId,enc);
        const now=new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"});
        setLastSynced(now); LS.set("last-synced",now);
        setSyncStatus("synced");
      }catch{setSyncStatus("error");setSyncMsg("同步失败，已保存本地");}
    }
  },[ghToken,ghGistId,encPwd]);

  const connectGist = async()=>{
    if(!ghToken.trim()||!encPwd.trim()){setSyncMsg("请填写 Token 和加密密码");return;}
    setConnecting(true);setSyncMsg("");
    try{
      const enc=await encryptStr(JSON.stringify(data),encPwd);
      const id=await GH.create(ghToken.trim(),enc);
      setGhGistId(id);
      LS.set("gh-token",ghToken.trim()); LS.set("gh-gist-id",id); LS.set("enc-pwd",encPwd);
      const now=new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"});
      setLastSynced(now); LS.set("last-synced",now);
      setSyncStatus("synced"); setSyncMsg("连接成功！数据已加密上传");
    }catch(e){setSyncStatus("error");setSyncMsg("连接失败："+e.message);}
    setConnecting(false);
  };

  const disconnectGist = ()=>{
    setGhToken(""); setGhGistId(""); setEncPwd(""); setLastSynced("");
    setSyncStatus("unconfigured"); setSyncMsg("");
    LS.del("gh-token"); LS.del("gh-gist-id"); LS.del("enc-pwd"); LS.del("last-synced");
  };

  const manualSync = async()=>{
    if(!isConfigured) return;
    setSyncStatus("syncing"); setSyncMsg("");
    try{
      const raw=await GH.fetch(ghToken,ghGistId);
      if(raw){ const plain=await decryptStr(raw,encPwd); const d=JSON.parse(plain); setData(d); LS.set("wt-data",d); }
      const now=new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"});
      setLastSynced(now); LS.set("last-synced",now);
      setSyncStatus("synced"); setSyncMsg("同步完成");
    }catch(e){setSyncStatus("error");setSyncMsg("同步失败："+e.message);}
  };

  const syncColor = {unconfigured:"#9ca3af",syncing:"#d97706",synced:"#059669",error:"#dc2626"}[syncStatus];
  const syncLabel = {unconfigured:"未同步",syncing:"同步中…",synced:"已同步",error:"同步失败"}[syncStatus];

  if(loading) return <div style={{...S.app,display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}><p style={{color:"#9ca3af"}}>加载中…</p></div>;

  const tabProps = {data,save};

  return (
    <div style={S.app}>
      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{fontSize:15,fontWeight:700,letterSpacing:1,color:"#111318"}}>WORK TRACKER</div>
        <div style={{fontSize:11,color:"#9ca3af",marginTop:4,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          记录 · 待办 · 知识库
          <span style={{display:"inline-flex",alignItems:"center",gap:3,color:syncColor}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:syncColor,display:"inline-block"}}/>
            {syncLabel}
            {lastSynced&&syncStatus==="synced"&&<span style={{color:"#9ca3af"}}>· {lastSynced}</span>}
          </span>
        </div>
      </div>

      <div style={S.tabs}>
        <button style={S.tab(tab==="log")}       onClick={()=>setTab("log")}>每日记录</button>
        <button style={S.tab(tab==="pool")}      onClick={()=>setTab("pool")}>待办池</button>
        <button style={S.tab(tab==="knowledge")} onClick={()=>setTab("knowledge")}>知识库</button>
        <button style={S.tab(tab==="settings")}  onClick={()=>setTab("settings")}>设置</button>
      </div>

      {tab==="log"       && <LogTab {...tabProps}/>}
      {tab==="pool"      && <PoolTab {...tabProps}/>}
      {tab==="knowledge" && <KnowledgeTab {...tabProps}/>}
      {tab==="settings"  && <SettingsTab data={data} save={save}
        ghToken={ghToken} setGhToken={setGhToken}
        ghGistId={ghGistId} encPwd={encPwd} setEncPwd={setEncPwd}
        syncStatus={syncStatus} syncMsg={syncMsg} lastSynced={lastSynced}
        isConfigured={isConfigured} connecting={connecting}
        connectGist={connectGist} disconnectGist={disconnectGist} manualSync={manualSync}/>}

      <div style={{textAlign:"center",padding:"12px 0 4px",fontSize:11,color:"#d1d5db"}}>
        数据加密同步至 GitHub Gist
      </div>
    </div>
  );
}

// ── Log Tab ───────────────────────────────────────────────
function LogTab({data,save}){
  const [selDate,setSelDate] = useState(today());
  const [name,setName]   = useState("");
  const [cat,setCat]     = useState("core");
  const [mins,setMins]   = useState(30);
  const [note,setNote]   = useState("");
  const [showNote,setShowNote] = useState(false);
  const [exportModal,setExportModal] = useState(false);

  const entries = data.logs[selDate]||[];
  const totalMins = entries.reduce((s,t)=>s+t.mins,0);

  const shiftDate = d=>{ const dt=new Date(selDate); dt.setDate(dt.getDate()+d); setSelDate(dt.toISOString().slice(0,10)); };

  const addTask = ()=>{
    if(!name.trim()) return;
    const entry={id:Date.now(),name:name.trim(),cat,mins,note:note.trim(),createdAt:selDate};
    const newLogs={...data.logs,[selDate]:[...entries,entry]};
    save({...data,logs:newLogs});
    setName(""); setNote(""); setShowNote(false); setMins(30);
  };

  const removeTask = id=>{
    const nl=(data.logs[selDate]||[]).filter(t=>t.id!==id);
    const newLogs={...data.logs};
    if(!nl.length) delete newLogs[selDate]; else newLogs[selDate]=nl;
    save({...data,logs:newLogs});
  };

  return(
    <>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginBottom:16}}>
        <button style={{...S.btnSm(),padding:"6px 14px"}} onClick={()=>shiftDate(-1)}>◀</button>
        <span style={{fontSize:15,fontWeight:600,minWidth:90,textAlign:"center"}}>
          {selDate===today()?"今天":selDate}
        </span>
        <button style={{...S.btnSm(),padding:"6px 14px"}} onClick={()=>shiftDate(1)}>▶</button>
        {selDate!==today()&&<button style={S.btnSm("#2563eb")} onClick={()=>setSelDate(today())}>今天</button>}
      </div>

      <div style={S.card}>
        <label style={S.label}>添加事项</label>
        <input style={{...S.input,marginBottom:8}} placeholder="做了什么？" value={name}
          onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&addTask()}/>
        <div style={{...S.row,marginBottom:8}}>
          <select style={{...S.select,flex:2}} value={cat} onChange={e=>setCat(e.target.value)}>
            {CATS.map(c=><option key={c.key} value={c.key}>{c.label}</option>)}
          </select>
          <select style={{...S.select,flex:"0 0 88px"}} value={mins} onChange={e=>setMins(Number(e.target.value))}>
            {[5,10,15,30,45,60,90,120,180,240].map(m=><option key={m} value={m}>{m>=60?`${m/60}h`:`${m}m`}</option>)}
          </select>
        </div>
        <div style={{fontSize:11,color:"#9ca3af",marginBottom:8}}>{CATS.find(c=>c.key===cat)?.desc}</div>
        <button style={{...S.btnSm("#f0f9ff","#2563eb"),marginBottom:8,border:"1px solid #bfdbfe"}}
          onClick={()=>setShowNote(v=>!v)}>
          {showNote?"收起备注":"+ 添加备注"}
        </button>
        {showNote&&<textarea style={{...S.textarea,marginBottom:8}} placeholder="记录判断、遇到的问题、或任何想法…"
          value={note} onChange={e=>setNote(e.target.value)}/>}
        <button style={S.btn()} onClick={addTask}>添加</button>
      </div>

      {entries.length>0&&(
        <div style={S.card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <span style={S.label}>今日记录</span>
            <span style={{fontSize:12,color:"#9ca3af"}}>{Math.floor(totalMins/60)}h{totalMins%60>0?`${totalMins%60}m`:""}</span>
          </div>
          <div style={{display:"flex",height:8,borderRadius:4,overflow:"hidden",marginBottom:12}}>
            {CATS.map(c=>{ const m=entries.filter(t=>t.cat===c.key).reduce((s,t)=>s+t.mins,0);
              return <div key={c.key} style={{background:c.color,width:`${(m/totalMins)*100}%`,minWidth:m>0?2:0,transition:"width .3s"}}/> })}
          </div>
          <div style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap"}}>
            {CATS.map(c=>{ const m=entries.filter(t=>t.cat===c.key).reduce((s,t)=>s+t.mins,0);
              if(!m) return null;
              return <span key={c.key} style={{fontSize:11,color:c.color}}>● {c.label} {Math.round((m/totalMins)*100)}%</span>; })}
          </div>
          {entries.map(t=>{
            const cat=CATS.find(c=>c.key===t.cat);
            return(
              <div key={t.id} style={{padding:"10px 12px",background:"#f9fafb",borderRadius:8,marginBottom:6}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div style={{display:"flex",alignItems:"center",flex:1,minWidth:0,gap:8}}>
                    <span style={{width:8,height:8,borderRadius:"50%",background:cat?.color,flexShrink:0}}/>
                    <span style={{fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.name}</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                    <span style={{fontSize:11,color:"#9ca3af"}}>{fmtMins(t.mins)}</span>
                    <button style={S.btnSm("#dc2626")} onClick={()=>removeTask(t.id)}>删</button>
                  </div>
                </div>
                {t.note&&<div style={{fontSize:12,color:"#6b7280",marginTop:6,paddingLeft:16,borderLeft:"2px solid #e5e7eb"}}>{t.note}</div>}
              </div>
            );
          })}
          <button style={{...S.btn("#f9fafb","#374151"),marginTop:4,border:"1px solid #e5e7eb"}}
            onClick={()=>setExportModal(true)}>↓ 导出数据</button>
        </div>
      )}

      {exportModal&&<ExportModal data={data} defaultDate={selDate} onClose={()=>setExportModal(false)}/>}
    </>
  );
}

// ── Export Modal ──────────────────────────────────────────
function ExportModal({data,defaultDate,onClose}){
  const [mode,setMode]     = useState("today");
  const [from,setFrom]     = useState(defaultDate);
  const [to,setTo]         = useState(today());
  const [type,setType]     = useState("plain");
  const [encPwd,setEncPwd] = useState("");
  const [msg,setMsg]       = useState("");

  const doExport = async()=>{
    let logsToExport={};
    if(mode==="today"){
      logsToExport={[defaultDate]:data.logs[defaultDate]||[]};
    } else {
      Object.keys(data.logs).filter(d=>d>=from&&d<=to).forEach(d=>{logsToExport[d]=data.logs[d];});
    }
    const payload=JSON.stringify({logs:logsToExport,pool:data.pool,knowledge:data.knowledge,exportedAt:new Date().toISOString()},null,2);
    let content=payload;
    let filename=`work-tracker-${mode==="today"?defaultDate:`${from}_${to}`}.json`;
    if(type==="encrypted"){
      if(!encPwd.trim()){setMsg("请填写加密密码");return;}
      content=await encryptStr(payload,encPwd);
      filename=filename.replace(".json",".enc.json");
    }
    const blob=new Blob([content],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=filename; a.click();
    onClose();
  };

  return(
    <div style={S.modal} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={S.modalBox}>
        <div style={{fontWeight:600,fontSize:15,marginBottom:16}}>导出数据</div>

        <label style={S.label}>导出范围</label>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <button style={S.btn(mode==="today"?"#2563eb":"#f9fafb",mode==="today"?"#fff":"#374151")} onClick={()=>setMode("today")}>今天</button>
          <button style={S.btn(mode==="range"?"#2563eb":"#f9fafb",mode==="range"?"#fff":"#374151")} onClick={()=>setMode("range")}>指定范围</button>
        </div>
        {mode==="range"&&(
          <div style={{...S.row,marginBottom:12}}>
            <div style={{flex:1}}><label style={S.label}>从</label><input type="date" style={S.input} value={from} onChange={e=>setFrom(e.target.value)}/></div>
            <div style={{flex:1}}><label style={S.label}>到</label><input type="date" style={S.input} value={to} onChange={e=>setTo(e.target.value)}/></div>
          </div>
        )}

        <label style={S.label}>导出类型</label>
        <div style={{display:"flex",gap:8,marginBottom:4}}>
          <button style={S.btn(type==="plain"?"#2563eb":"#f9fafb",type==="plain"?"#fff":"#374151")} onClick={()=>setType("plain")}>明文（发给AI分析）</button>
          <button style={S.btn(type==="encrypted"?"#2563eb":"#f9fafb",type==="encrypted"?"#fff":"#374151")} onClick={()=>setType("encrypted")}>加密（本地备份）</button>
        </div>
        {type==="plain"&&<div style={{fontSize:11,color:"#9ca3af",marginBottom:12}}>明文文件可上传给 Claude 进行分析提炼</div>}
        {type==="encrypted"&&(
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:"#9ca3af",marginBottom:6}}>加密备份只有你自己能解密</div>
            <input style={S.input} type="password" placeholder="加密密码" value={encPwd} onChange={e=>setEncPwd(e.target.value)}/>
          </div>
        )}
        {msg&&<div style={{fontSize:12,color:"#dc2626",marginBottom:8}}>{msg}</div>}
        <div style={{display:"flex",gap:8}}>
          <button style={S.btn()} onClick={doExport}>导出</button>
          <button style={S.btn("#f9fafb","#374151")} onClick={onClose}>取消</button>
        </div>
      </div>
    </div>
  );
}

// ── Pool Tab ──────────────────────────────────────────────
function PoolTab({data,save}){
  const [view,setView]       = useState("flat");
  const [showAddProj,setShowAddProj] = useState(false);
  const [showAddItem,setShowAddItem] = useState(false);
  const [projName,setProjName]       = useState("");
  const [itemName,setItemName]       = useState("");
  const [itemProj,setItemProj]       = useState("");
  const [itemValue,setItemValue]     = useState(1);
  const [itemUrgency,setItemUrgency] = useState(1);
  const [itemDeadline,setItemDeadline] = useState("");
  const [editItem,setEditItem]       = useState(null);
  const [editProj,setEditProj]       = useState(null);

  const projects = data.pool?.projects||[];
  const items    = data.pool?.items||[];
  const activeItems  = items.filter(i=>!i.done);
  const doneItems    = items.filter(i=>i.done);

  const savePool = p => save({...data,pool:p});

  const addProject = ()=>{
    if(!projName.trim()) return;
    const p={id:Date.now(),name:projName.trim(),status:"active"};
    savePool({...data.pool,projects:[...projects,p]});
    setProjName(""); setShowAddProj(false);
  };

  const addItem = ()=>{
    if(!itemName.trim()) return;
    const it={id:Date.now(),name:itemName.trim(),projectId:itemProj||null,
      value:itemValue,urgency:itemUrgency,deadline:itemDeadline||null,
      blocked:false,done:false,created:today()};
    savePool({...data.pool,items:[...items,it]});
    setItemName(""); setItemProj(""); setItemValue(1); setItemUrgency(1); setItemDeadline(""); setShowAddItem(false);
  };

  const toggleDone = id=>savePool({...data.pool,items:items.map(i=>i.id===id?{...i,done:!i.done}:i)});
  const toggleBlocked = id=>savePool({...data.pool,items:items.map(i=>i.id===id?{...i,blocked:!i.blocked}:i)});
  const removeItem = id=>savePool({...data.pool,items:items.filter(i=>i.id!==id)});
  const removeProject = id=>{
    savePool({projects:projects.filter(p=>p.id!==id),items:items.map(i=>i.projectId===id?{...i,projectId:null}:i)});
  };
  const toggleProjStatus = id=>{
    savePool({...data.pool,projects:projects.map(p=>p.id===id?{...p,status:p.status==="active"?"blocked":"active"}:p)});
  };
  const saveItemEdit = ()=>{
    if(!editItem) return;
    savePool({...data.pool,items:items.map(i=>i.id===editItem.id?editItem:i)});
    setEditItem(null);
  };

  const sortedItems = [...activeItems].sort((a,b)=>(b.value*3+b.urgency)-(a.value*3+a.urgency));

  const ItemCard = ({item,dimmed})=>{
    const proj=projects.find(p=>p.id===item.projectId);
    const days=item.deadline?Math.ceil((new Date(item.deadline)-new Date())/86400000):null;
    return(
      <div style={{padding:"10px 12px",background:"#f9fafb",borderRadius:8,marginBottom:6,opacity:dimmed?0.45:1}}>
        {editItem?.id===item.id?(
          <div>
            <input style={{...S.input,marginBottom:8}} value={editItem.name} onChange={e=>setEditItem({...editItem,name:e.target.value})}/>
            <div style={{...S.row,marginBottom:8}}>
              <select style={{...S.select,flex:2}} value={editItem.projectId||""} onChange={e=>setEditItem({...editItem,projectId:e.target.value||null})}>
                <option value="">无归属项目</option>
                {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
              <input type="date" style={{...S.select,flex:"0 0 140px"}} value={editItem.deadline||""} onChange={e=>setEditItem({...editItem,deadline:e.target.value||null})}/>
            </div>
            <div style={{...S.row,marginBottom:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:11,color:"#9ca3af",marginBottom:4}}>价值</div>
                <div style={{display:"flex",gap:4}}>
                  {VALUE.map((v,i)=><button key={i} style={{...S.btnSm(editItem.value===i?"#2563eb":undefined),flex:1}} onClick={()=>setEditItem({...editItem,value:i})}>{v}</button>)}
                </div>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:11,color:"#9ca3af",marginBottom:4}}>紧急</div>
                <div style={{display:"flex",gap:4}}>
                  {URGENCY.map((u,i)=><button key={i} style={{...S.btnSm(editItem.urgency===i?"#d97706":undefined),flex:1}} onClick={()=>setEditItem({...editItem,urgency:i})}>{u}</button>)}
                </div>
              </div>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button style={{...S.btn(),flex:1,padding:"7px 0"}} onClick={saveItemEdit}>保存</button>
              <button style={{...S.btn("#f9fafb","#374151"),flex:1,padding:"7px 0"}} onClick={()=>setEditItem(null)}>取消</button>
            </div>
          </div>
        ):(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,marginBottom:4,textDecoration:dimmed?"line-through":"none"}}>{item.name}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4,alignItems:"center"}}>
                  <span style={S.badge(item.value===2?"#2563eb":item.value===1?"#4b5563":"#9ca3af")}>{VALUE[item.value]}价值</span>
                  <span style={S.badge(item.urgency===2?"#dc2626":item.urgency===1?"#d97706":"#9ca3af")}>{URGENCY[item.urgency]}</span>
                  {proj&&<span style={{fontSize:10,color:"#6b7280",background:"#f3f4f6",padding:"2px 6px",borderRadius:4}}>{proj.name}</span>}
                  {days!==null&&<span style={{fontSize:11,color:days<=3?"#dc2626":days<=7?"#d97706":"#6b7280"}}>{days<=0?"已过期":`${days}天后截止`}</span>}
                  {item.blocked&&<span style={{fontSize:11,color:"#9ca3af"}}>搁置中</span>}
                </div>
              </div>
              {!dimmed&&(
                <div style={{display:"flex",gap:4,flexShrink:0,marginLeft:8}}>
                  <button style={S.btnSm("#f59e0b")} onClick={()=>setEditItem({...item})}>✎</button>
                  <button style={S.btnSm(item.blocked?"#6b7280":"#e5e7eb",item.blocked?"#fff":"#374151")} onClick={()=>toggleBlocked(item.id)}>{item.blocked?"取消搁置":"搁置"}</button>
                  <button style={S.btnSm("#059669")} onClick={()=>toggleDone(item.id)}>✓</button>
                  <button style={S.btnSm("#dc2626")} onClick={()=>removeItem(item.id)}>✕</button>
                </div>
              )}
              {dimmed&&(
                <div style={{display:"flex",gap:4,flexShrink:0,marginLeft:8}}>
                  <button style={S.btnSm()} onClick={()=>toggleDone(item.id)}>恢复</button>
                  <button style={S.btnSm("#dc2626")} onClick={()=>removeItem(item.id)}>删</button>
                </div>
              )}
            </div>
          </div>
        )}
      </div>
    );
  };

  return(
    <>
      {/* Add Project */}
      <div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:showAddProj?12:0}}>
          <label style={{...S.label,marginBottom:0}}>项目 ({projects.length})</label>
          <button style={S.btnSm("#2563eb")} onClick={()=>setShowAddProj(v=>!v)}>{showAddProj?"取消":"+ 新建项目"}</button>
        </div>
        {showAddProj&&(
          <div style={{marginTop:10}}>
            <input style={{...S.input,marginBottom:8}} placeholder="项目名称" value={projName}
              onChange={e=>setProjName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addProject()}/>
            <button style={S.btn()} onClick={addProject}>添加项目</button>
          </div>
        )}
        {projects.length>0&&(
          <div style={{marginTop:12}}>
            {projects.map(p=>(
              <div key={p.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 10px",background:p.status==="blocked"?"#fafafa":"#f0f9ff",borderRadius:8,marginBottom:6,opacity:p.status==="blocked"?0.6:1}}>
                <span style={{fontSize:13,color:p.status==="blocked"?"#9ca3af":"#1a1d27"}}>{p.name}</span>
                <div style={{display:"flex",gap:4}}>
                  <button style={S.btnSm(p.status==="blocked"?"#059669":"#e5e7eb",p.status==="blocked"?"#fff":"#374151")}
                    onClick={()=>toggleProjStatus(p.id)}>{p.status==="blocked"?"激活":"搁置"}</button>
                  <button style={S.btnSm("#dc2626")} onClick={()=>removeProject(p.id)}>删</button>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Add Item */}
      <div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:showAddItem?12:0}}>
          <label style={{...S.label,marginBottom:0}}>事项 ({activeItems.length})</label>
          <div style={{display:"flex",gap:6}}>
            <button style={S.btnSm(view==="flat"?"#2563eb":undefined)} onClick={()=>setView("flat")}>平铺</button>
            <button style={S.btnSm(view==="group"?"#2563eb":undefined)} onClick={()=>setView("group")}>按项目</button>
            <button style={S.btnSm("#059669")} onClick={()=>setShowAddItem(v=>!v)}>{showAddItem?"取消":"+ 新增"}</button>
          </div>
        </div>

        {showAddItem&&(
          <div style={{marginTop:10}}>
            <input style={{...S.input,marginBottom:8}} placeholder="待办事项" value={itemName}
              onChange={e=>setItemName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addItem()}/>
            <div style={{...S.row,marginBottom:8}}>
              <select style={{...S.select,flex:2}} value={itemProj} onChange={e=>setItemProj(e.target.value)}>
                <option value="">无归属项目</option>
                {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
              <input type="date" style={{...S.select,flex:"0 0 140px"}} value={itemDeadline} onChange={e=>setItemDeadline(e.target.value)}/>
            </div>
            <div style={{...S.row,marginBottom:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:11,color:"#9ca3af",marginBottom:4}}>价值</div>
                <div style={{display:"flex",gap:4}}>
                  {VALUE.map((v,i)=><button key={i} style={{...S.btnSm(itemValue===i?"#2563eb":undefined),flex:1}} onClick={()=>setItemValue(i)}>{v}</button>)}
                </div>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:11,color:"#9ca3af",marginBottom:4}}>紧急</div>
                <div style={{display:"flex",gap:4}}>
                  {URGENCY.map((u,i)=><button key={i} style={{...S.btnSm(itemUrgency===i?"#d97706":undefined),flex:1}} onClick={()=>setItemUrgency(i)}>{u}</button>)}
                </div>
              </div>
            </div>
            <button style={S.btn()} onClick={addItem}>加入待办池</button>
          </div>
        )}
      </div>

      {/* Item List */}
      {view==="flat"&&(
        <div style={S.card}>
          {sortedItems.length===0&&<div style={{textAlign:"center",color:"#9ca3af",padding:24}}>暂无待办事项</div>}
          {sortedItems.map(item=><ItemCard key={item.id} item={item} dimmed={item.blocked}/>)}
        </div>
      )}

      {view==="group"&&(
        <>
          {[...projects,{id:null,name:"未归属事项"}].map(proj=>{
            const its=sortedItems.filter(i=>(proj.id===null?!i.projectId:i.projectId==proj.id));
            if(!its.length) return null;
            return(
              <div key={proj.id||"none"} style={S.card}>
                <label style={S.label}>{proj.name} ({its.length})</label>
                {its.map(item=><ItemCard key={item.id} item={item} dimmed={item.blocked}/>)}
              </div>
            );
          })}
        </>
      )}

      {doneItems.length>0&&(
        <div style={S.card}>
          <label style={S.label}>已完成 ({doneItems.length})</label>
          {doneItems.map(item=><ItemCard key={item.id} item={item} dimmed={true}/>)}
        </div>
      )}
    </>
  );
}

// ── Knowledge Tab ─────────────────────────────────────────
function KnowledgeTab({data,save}){
  const [search,setSearch]       = useState("");
  const [showAddTheme,setShowAddTheme] = useState(false);
  const [themeName,setThemeName] = useState("");
  const [activeTheme,setActiveTheme] = useState(null);
  const [showAddEntry,setShowAddEntry] = useState(false);
  const [entryContent,setEntryContent] = useState("");
  const [entryLogRef,setEntryLogRef]   = useState({date:"",taskId:""});
  const [refModal,setRefModal]         = useState(null);

  const themes  = data.knowledge?.themes||[];
  const saveKnow = k=>save({...data,knowledge:k});

  const addTheme = ()=>{
    if(!themeName.trim()) return;
    const t={id:Date.now(),name:themeName.trim(),entries:[]};
    saveKnow({...data.knowledge,themes:[...themes,t]});
    setThemeName(""); setShowAddTheme(false);
  };

  const removeTheme = id=>saveKnow({...data.knowledge,themes:themes.filter(t=>t.id!==id)});

  const addEntry = ()=>{
    if(!entryContent.trim()||!activeTheme) return;
    const entry={id:Date.now(),content:entryContent.trim(),
      logRef:entryLogRef.date&&entryLogRef.taskId?entryLogRef:null,
      createdAt:today()};
    saveKnow({...data.knowledge,themes:themes.map(t=>t.id===activeTheme?{...t,entries:[...t.entries,entry]}:t)});
    setEntryContent(""); setEntryLogRef({date:"",taskId:""}); setShowAddEntry(false);
  };

  const removeEntry = (themeId,entryId)=>{
    saveKnow({...data.knowledge,themes:themes.map(t=>t.id===themeId?{...t,entries:t.entries.filter(e=>e.id!==entryId)}:t)});
  };

  const filteredThemes = themes.filter(t=>
    !search || t.name.includes(search) || t.entries.some(e=>e.content.includes(search))
  );

  // find log task by ref
  const findTask = (ref)=>{
    if(!ref) return null;
    const dayLogs=data.logs[ref.date]||[];
    return dayLogs.find(t=>t.id===Number(ref.taskId))||null;
  };

  // available log dates for dropdown
  const logDates = Object.keys(data.logs).sort().reverse();
  const tasksForDate = entryLogRef.date ? (data.logs[entryLogRef.date]||[]) : [];

  return(
    <>
      <div style={S.card}>
        <input style={S.input} placeholder="搜索知识库…" value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <span style={{fontSize:13,color:"#6b7280"}}>{themes.length} 个主题</span>
        <button style={S.btnSm("#2563eb")} onClick={()=>setShowAddTheme(v=>!v)}>{showAddTheme?"取消":"+ 新建主题"}</button>
      </div>

      {showAddTheme&&(
        <div style={S.card}>
          <input style={{...S.input,marginBottom:8}} placeholder="主题名称，例如：财务流程设计" value={themeName}
            onChange={e=>setThemeName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTheme()}/>
          <button style={S.btn()} onClick={addTheme}>创建主题</button>
        </div>
      )}

      {filteredThemes.length===0&&(
        <div style={{textAlign:"center",color:"#9ca3af",padding:40}}>
          <div style={{fontSize:32,marginBottom:8}}>📚</div>
          <p style={{fontSize:13}}>{search?"没有找到相关内容":"每次导出数据与 Claude 分析后，将提炼结果粘贴进来"}</p>
        </div>
      )}

      {filteredThemes.map(theme=>(
        <div key={theme.id} style={S.card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div>
              <div style={{fontWeight:600,fontSize:14}}>{theme.name}</div>
              <div style={{fontSize:11,color:"#9ca3af",marginTop:2}}>{theme.entries.length} 条经验</div>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button style={S.btnSm("#2563eb")} onClick={()=>{setActiveTheme(theme.id);setShowAddEntry(true);}}>+ 新增</button>
              <button style={S.btnSm("#dc2626")} onClick={()=>removeTheme(theme.id)}>删除</button>
            </div>
          </div>

          {activeTheme===theme.id&&showAddEntry&&(
            <div style={{background:"#f0f9ff",borderRadius:8,padding:12,marginBottom:12,border:"1px solid #bfdbfe"}}>
              <label style={S.label}>经验内容</label>
              <textarea style={{...S.textarea,marginBottom:8}} placeholder="粘贴从 Claude 提炼的经验内容…"
                value={entryContent} onChange={e=>setEntryContent(e.target.value)}/>
              <label style={S.label}>关联每日记录（可选）</label>
              <div style={{...S.row,marginBottom:8}}>
                <select style={{...S.select,flex:1}} value={entryLogRef.date} onChange={e=>setEntryLogRef({date:e.target.value,taskId:""})}>
                  <option value="">选择日期</option>
                  {logDates.map(d=><option key={d} value={d}>{d}</option>)}
                </select>
                <select style={{...S.select,flex:2}} value={entryLogRef.taskId} onChange={e=>setEntryLogRef({...entryLogRef,taskId:e.target.value})} disabled={!tasksForDate.length}>
                  <option value="">选择事项</option>
                  {tasksForDate.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
                </select>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button style={{...S.btn(),flex:1,padding:"8px 0"}} onClick={addEntry}>保存</button>
                <button style={{...S.btn("#f9fafb","#374151"),flex:1,padding:"8px 0"}} onClick={()=>{setShowAddEntry(false);setActiveTheme(null);}}>取消</button>
              </div>
            </div>
          )}

          {theme.entries.map(entry=>{
            const task=findTask(entry.logRef);
            return(
              <div key={entry.id} style={{padding:"10px 12px",background:"#f9fafb",borderRadius:8,marginBottom:6,borderLeft:"3px solid #2563eb"}}>
                <div style={{fontSize:13,color:"#1a1d27",lineHeight:1.6,marginBottom:6}}>{entry.content}</div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <span style={{fontSize:11,color:"#9ca3af"}}>{entry.createdAt}</span>
                    {entry.logRef&&task&&(
                      <button style={{...S.btnSm("#f0f9ff","#2563eb"),border:"1px solid #bfdbfe",fontSize:10}}
                        onClick={()=>setRefModal({task,date:entry.logRef.date})}>
                        查看来源 →
                      </button>
                    )}
                  </div>
                  <button style={S.btnSm("#dc2626")} onClick={()=>removeEntry(theme.id,entry.id)}>删</button>
                </div>
              </div>
            );
          })}
        </div>
      ))}

      {refModal&&(
        <div style={S.modal} onClick={e=>e.target===e.currentTarget&&setRefModal(null)}>
          <div style={S.modalBox}>
            <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>来源记录</div>
            <div style={{fontSize:11,color:"#9ca3af",marginBottom:12}}>{refModal.date}</div>
            <div style={{padding:"12px",background:"#f9fafb",borderRadius:8,marginBottom:12}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <span style={{width:8,height:8,borderRadius:"50%",background:CATS.find(c=>c.key===refModal.task.cat)?.color||"#9ca3af",flexShrink:0}}/>
                <span style={{fontSize:14,fontWeight:500}}>{refModal.task.name}</span>
              </div>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:4}}>
                {CATS.find(c=>c.key===refModal.task.cat)?.label} · {fmtMins(refModal.task.mins)}
              </div>
              {refModal.task.note&&(
                <div style={{fontSize:13,color:"#374151",marginTop:8,paddingTop:8,borderTop:"1px solid #e5e7eb"}}>
                  {refModal.task.note}
                </div>
              )}
            </div>
            <button style={S.btn("#f9fafb","#374151")} onClick={()=>setRefModal(null)}>关闭</button>
          </div>
        </div>
      )}
    </>
  );
}

// ── Settings Tab ──────────────────────────────────────────
function SettingsTab({data,save,ghToken,setGhToken,ghGistId,encPwd,setEncPwd,
  syncStatus,syncMsg,lastSynced,isConfigured,connecting,connectGist,disconnectGist,manualSync}){
  const [showToken,setShowToken] = useState(false);
  const [showPwd,setShowPwd]     = useState(false);

  const importData = e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=async ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        // merge logs
        const mergedLogs={...(d.logs||{})};
        // merge pool
        const mergedPool=d.pool||{projects:[],items:[]};
        // merge knowledge
        const mergedKnow=d.knowledge||{themes:[]};
        await save({logs:mergedLogs,pool:mergedPool,knowledge:mergedKnow});
        alert("导入成功！");
      }catch{ alert("文件格式有误，请使用本工具导出的备份文件"); }
    };
    reader.readAsText(file); e.target.value="";
  };

  const syncColor={unconfigured:"#9ca3af",syncing:"#d97706",synced:"#059669",error:"#dc2626"}[syncStatus];
  const syncLabel={unconfigured:"未配置",syncing:"同步中…",synced:"已同步",error:"同步失败"}[syncStatus];

  return(
    <>
      <div style={S.card}>
        <label style={S.label}>云端同步 · GitHub Gist</label>
        {isConfigured?(
          <div style={{marginBottom:12,padding:"10px 12px",background:"#f0fdf4",borderRadius:8,border:"1px solid #bbf7d0"}}>
            <div style={{fontSize:13,color:"#15803d",fontWeight:600}}>✓ 已连接</div>
            <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>Gist ID: {ghGistId.slice(0,8)}…</div>
            {lastSynced&&<div style={{fontSize:11,color:"#6b7280"}}>上次同步：{lastSynced}</div>}
          </div>
        ):(
          <div style={{marginBottom:12,padding:"10px 12px",background:"#fafafa",borderRadius:8,border:"1px solid #e5e7eb",fontSize:13,color:"#6b7280"}}>
            未连接，数据仅保存在本设备
          </div>
        )}

        <label style={S.label}>GitHub Token</label>
        <div style={{display:"flex",gap:6,marginBottom:10}}>
          <input style={{...S.input,flex:1}} type={showToken?"text":"password"}
            placeholder="ghp_xxxxxxxxxxxxxxxx" value={ghToken}
            onChange={e=>setGhToken(e.target.value)} disabled={isConfigured}/>
          <button style={{...S.btnSm(),padding:"10px 12px"}} onClick={()=>setShowToken(v=>!v)}>{showToken?"隐藏":"显示"}</button>
        </div>

        <label style={S.label}>加密密码</label>
        <div style={{display:"flex",gap:6,marginBottom:4}}>
          <input style={{...S.input,flex:1}} type={showPwd?"text":"password"}
            placeholder="自定义加密密码（请牢记）" value={encPwd}
            onChange={e=>setEncPwd(e.target.value)} disabled={isConfigured}/>
          <button style={{...S.btnSm(),padding:"10px 12px"}} onClick={()=>setShowPwd(v=>!v)}>{showPwd?"隐藏":"显示"}</button>
        </div>
        <div style={{fontSize:11,color:"#9ca3af",marginBottom:12}}>数据上传前在本地加密，GitHub 只存密文。密码丢失数据无法恢复。</div>

        {syncMsg&&(
          <div style={{fontSize:12,color:syncStatus==="error"?"#dc2626":"#059669",marginBottom:10,
            padding:"8px 10px",background:syncStatus==="error"?"#fef2f2":"#f0fdf4",borderRadius:6}}>
            {syncMsg}
          </div>
        )}

        {!isConfigured?(
          <button style={S.btn()} onClick={connectGist} disabled={connecting}>
            {connecting?"连接中…":"连接 GitHub Gist"}
          </button>
        ):(
          <div style={{display:"flex",gap:8}}>
            <button style={{...S.btn("#2563eb"),flex:2}} onClick={manualSync} disabled={syncStatus==="syncing"}>
              {syncStatus==="syncing"?"同步中…":"↻ 立即同步"}
            </button>
            <button style={{...S.btn("#dc2626"),flex:1}} onClick={disconnectGist}>断开</button>
          </div>
        )}
      </div>

      <div style={S.card}>
        <label style={S.label}>本地备份</label>
        <div style={{fontSize:11,color:"#9ca3af",marginBottom:10}}>导入旧版追踪器数据（JSON格式）或导出加密备份</div>
        <label style={{display:"block",padding:"9px 0",background:"#f9fafb",border:"1px solid #e5e7eb",
          borderRadius:8,color:"#374151",fontSize:12,fontWeight:600,cursor:"pointer",textAlign:"center",marginBottom:8}}>
          ↑ 导入备份文件
          <input type="file" accept=".json" onChange={importData} style={{display:"none"}}/>
        </label>
      </div>
    </>
  );
}

// ── Mount ─────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
